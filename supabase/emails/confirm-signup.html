<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>confirm your email — keysmash</title>
  </head>
  <body style="margin:0;padding:0;background:#F5EFE0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#2B1D0E;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F5EFE0;">
      <tr>
        <td align="center" style="padding:48px 24px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;background:#EDE4CF;border:1px solid #D4C4A0;border-radius:6px;">
            <tr>
              <td style="padding:32px 32px 24px 32px;border-bottom:1px solid #D4C4A0;">
                <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:600;letter-spacing:-0.01em;color:#2B1D0E;">
                  keysmash
                </p>
                <p style="margin:4px 0 0 0;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8B7355;">
                  daily typing challenge
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <h1 style="margin:0 0 16px 0;font-size:20px;font-weight:600;letter-spacing:-0.01em;color:#2B1D0E;">
                  confirm your email
                </h1>
                <p style="margin:0 0 28px 0;font-size:15px;line-height:1.55;color:#2B1D0E;">
                  one click to start tracking your daily passages.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td style="background:#4C6B3F;border-radius:4px;">
                      <a href="{{ .ConfirmationURL }}"
                         style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;color:#F5EFE0;text-decoration:none;">
                        confirm email
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:28px 0 8px 0;font-size:12px;color:#8B7355;">
                  or paste this link into your browser:
                </p>
                <p style="margin:0;font-size:12px;line-height:1.5;word-break:break-all;color:#8B7355;">
                  <a href="{{ .ConfirmationURL }}" style="color:#4C6B3F;text-decoration:underline;">{{ .ConfirmationURL }}</a>
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 32px;border-top:1px solid #D4C4A0;">
                <p style="margin:0;font-size:12px;color:#8B7355;">
                  didn't sign up? you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
          <p style="margin:24px 0 0 0;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8B7355;">
            keysmash.app
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
